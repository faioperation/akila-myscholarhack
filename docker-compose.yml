version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: myscholarhack-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-schollar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-my_schollar_hack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-schollar} -d ${DB_NAME:-my_schollar_hack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myscholarhack-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-FOxCOTdbUiBmN5kBZIumOxVdIdKWsSpp}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-FOxCOTdbUiBmN5kBZIumOxVdIdKWsSpp}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myscholarhack-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-schollar}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-my_schollar_hack}?schema=public
      REDIS_URL: redis://default:${REDIS_PASSWORD:-FOxCOTdbUiBmN5kBZIumOxVdIdKWsSpp}@redis:6379
      JWT_SECRET_TOKEN: ${JWT_SECRET_TOKEN}
      JWT_REFRESH_TOKEN: ${JWT_REFRESH_TOKEN}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUND: ${BCRYPT_SALT_ROUND:-10}
      EXPRESS_SESSION: ${EXPRESS_SESSION:-10}
      SERVER_URL: ${SERVER_URL:-http://localhost:4000}
      FRONT_END_URL: ${FRONT_END_URL:-http://localhost:3000}
      AI_SERVICE_URL: http://ai:3000/api/essay
      AI_ESSAY_COMPARE_API_URL: http://ai:3000/api/compare
      AI_RECOMMENDATION_API_URL: http://ai:3000/api/ai/recommend-scholarships
      SCHOLARSHIP_GETTING_API: http://ai:3000/api/scrape-sync
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - app-network

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: myscholarhack-ai
    restart: always
    environment:
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      USER_API_URL: http://backend:4000/api/user/all/for-ai
      SCHOLARSHIP_AI_API_URL: http://backend:4000/api/essay-recommendation/scholarships/all/for-ai
      BACKEND_BULK_API: http://backend:4000/api/essay-recommendation/sync-scholarships
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_API_MAIN_URL: ${NEXT_PUBLIC_API_MAIN_URL:-http://localhost:4000}
    container_name: myscholarhack-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  app-network:
    driver: bridge
